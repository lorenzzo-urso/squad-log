{% extends "base.html" %}
{% block title %}{% if editing %}Editar card{% else %}Novo card{% endif %}{% endblock %}
{% block content %}
<main class="dialog-page">
<form class="dialog elev-lg" method="post"
      action="{% if editing %}/kanban/cards/{{ card.id }}/edit{% else %}/kanban/cards{% endif %}">
    <div class="dialog-title">{% if editing %}Editar card{% else %}Novo card{% endif %}</div>
    <div class="field">
        <label>Título</label>
        <input class="input" type="text" name="title" value="{{ card.title }}" required>
    </div>
    <div class="field">
        <label>Descrição</label>
        <textarea class="input" name="description" rows="3">{{ card.description or '' }}</textarea>
    </div>
    <div class="field">
        <label>Produto/tecnologia</label>
        <select class="input" name="tech_tag_id" required>
            {% for t in all_tags %}
            <option value="{{ t.id }}" {% if card.tech_tag_id == t.id %}selected{% endif %}>{{ t.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="field">
        <label>Responsáveis</label>
        <div style="display:flex;gap:24px;padding-top:4px;flex-wrap:wrap">
            {% for u in all_users %}
            <label class="checkbox-row">
                <input type="checkbox" name="responsible_ids" value="{{ u.id }}"
                    {% if u.id in responsible_ids %}checked{% endif %}>
                {{ u.name }}
            </label>
            {% endfor %}
        </div>
    </div>
    <div class="dialog-actions">
        <a href="/kanban" class="btn btn-secondary">Cancelar</a>
        <button type="submit" class="btn btn-primary">{% if editing %}Salvar{% else %}Criar{% endif %}</button>
    </div>
</form>
</main>
{% endblock %}
