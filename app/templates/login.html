{% extends "base.html" %}
{% block title %}Entrar{% endblock %}
{% block content %}
<h1>Entrar</h1>
<form class="card-form" method="post" action="/login">
    <label>Email
        <input type="email" name="email" required autofocus>
    </label>
    <label>Senha
        <input type="password" name="password" required>
    </label>
    <button type="submit">Entrar</button>
</form>
{% endblock %}
